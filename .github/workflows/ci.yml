name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # pnpm version is taken from `packageManager` in package.json
      # (Corepack convention). Don't also pass `with: version:` here —
      # the action errors on a version mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: hashFiles('pnpm-lock.yaml') != ''

      - run: pnpm install
        if: hashFiles('pnpm-lock.yaml') == ''

      # Build first: cross-package imports resolve through each package's
      # `exports` field → `dist/index.js`. Tests, lint, and typecheck all
      # depend on built outputs from upstream workspace packages.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
