name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Use Corepack (bundled with Node) to install the pnpm version
      # pinned in `packageManager` in package.json. This avoids the
      # `pnpm/action-setup` marketplace action, which hit persistent
      # codeload.github.com fetch failures on the Ubuntu runner pool
      # during Phase 3 CI (2026-05-26). Corepack reads packageManager
      # at first pnpm invocation; zero codeload dependency.
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: hashFiles('pnpm-lock.yaml') != ''

      - run: pnpm install
        if: hashFiles('pnpm-lock.yaml') == ''

      # Build first: cross-package imports resolve through each package's
      # `exports` field → `dist/index.js`. Tests, lint, and typecheck all
      # depend on built outputs from upstream workspace packages.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
