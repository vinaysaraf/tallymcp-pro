# electron-builder NSIS config for the TallyMCP Configurator.
#
# Paths in this file are relative to apps/configurator/ (the package
# directory). When invoked from the repo root via `pnpm package`, the
# orchestrator script (root package.json) `cd`s into apps/configurator/
# before running `electron-builder build`.

appId: com.vinaysaraf.tallymcp.configurator
productName: TallyMCP
copyright: Copyright © 2026 Vinay Saraf
artifactName: TallyMCP-Setup-v${version}.${ext}

asar: true
asarUnpack: []

directories:
  # buildResources holds installer icons + license texts (Phase 3 ships
  # without custom icons; electron-builder falls back to its default).
  buildResources: ../../installer/buildResources
  output: dist-installer

files:
  - dist/**
  - package.json
  - "!node_modules/**"

# extraFiles land at the NSIS install dir ROOT (not inside `resources/`),
# which is what the wire snippet expects:
#   command: <installDir>\node.exe
#   args:    <installDir>\mcp-server\main.bundle.js
# v1.0.5+ (#152): mcp-server ships as a single esbuild bundle (main.bundle.js)
# directly under mcp-server/. No dist/ subdir, no node_modules tree.
# (Previously "mcp-server\dist\main.js" via pnpm deploy --prod; that layout
# broke on Windows NSIS extraction due to deep node_modules paths.)
extraFiles:
  - from: ../../installer/staging/node.exe
    to: ./node.exe
  - from: ../../installer/staging/mcp-server
    to: ./mcp-server

win:
  target:
    - target: nsis
      arch:
        - x64
  publisherName: Vinay Saraf
  # Code signing: electron-builder picks up CSC_LINK + CSC_KEY_PASSWORD
  # automatically. If unset, build proceeds unsigned with a console warning
  # (see docs/v1-installer-phase3-signing-setup.md).

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: TallyMCP-Setup-v${version}.${ext}
  unicode: true
  warningsAsErrors: true
  include: ../../installer/installer.nsh
  shortcutName: TallyMCP
  menuCategory: false
  installerLanguages: en_US
  deleteAppDataOnUninstall: false  # CA's data is sacred; never wipe %APPDATA%

# GitHub Releases publish target. electron-builder uses this to:
#   - generate latest.yml (for electron-updater).
#   - upload artifacts to the release matching the current tag IF the
#     build is invoked with `--publish always`.
# The root `pnpm package` script passes `--publish never` explicitly so
# electron-builder NEVER auto-uploads. This matters in CI: when a build
# runs on a tag ref in GitHub Actions, electron-builder's default
# publish policy becomes implicit `onTag` and it tries to upload via
# its built-in GitHub publisher — which fails without GH_TOKEN. The
# release.yml workflow uses softprops/action-gh-release@v2 for uploads
# as a separate step. `--publish never` keeps that split clean.
# (latest.yml generation is independent of publish policy and continues.)
publish:
  provider: github
  owner: vinaysaraf
  repo: tallymcp-pro
  releaseType: release
